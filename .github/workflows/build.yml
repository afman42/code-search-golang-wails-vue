name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Linux Dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev libwebkit2gtk-4.1-0 build-essential curl file git

      - name: Build Frontend Dist
        run: npm run build
        working-directory: frontend

      - name: Go Vet
        run: go vet ./...

      - name: Go Tests
        run: go test -v -timeout 120s ./...

      - name: Frontend Unit Tests
        run: npm test
        working-directory: frontend

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Obfuscated Garble
        run: go install mvdan.cc/garble@latest

      - name: Install Linux Dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev upx-ucl
          sudo apt install -y libwebkit2gtk-4.1-dev libwebkit2gtk-4.1-0 build-essential curl file git
          # Cross-compilation tools for Windows binary stripping
          sudo apt install -y binutils-mingw-w64

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build for Linux
        run: |
          go mod tidy
          # Build without -upx so we can strip first, then compress manually
          wails build -platform linux --tags webkit2_41 -obfuscated -trimpath -ldflags "-s -w" -o code-search-golang-linux
          # Strip any remaining metadata that Go's -s -w might miss
          strip -s ./build/bin/code-search-golang-linux
          # Compress with maximum UPX settings
          upx --best --lzma ./build/bin/code-search-golang-linux
        working-directory: .

      - name: Build for Windows
        run: |
          go mod tidy
          # Build without -upx so we can strip first, then compress manually
          wails build -platform windows -obfuscated -trimpath -ldflags "-s -w" -o code-search-golang-windows.exe
          # Strip PE binary using mingw-w64 cross-strip tool
          x86_64-w64-mingw32-strip -s ./build/bin/code-search-golang-windows.exe
          # Compress with maximum UPX settings
          upx --best --lzma ./build/bin/code-search-golang-windows.exe
        working-directory: .

      - name: Upload Artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: code-search-golang-linux
          path: ./build/bin/code-search-golang-linux

      - name: Upload Artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: code-search-golang-windows
          path: ./build/bin/code-search-golang-windows.exe
